name: Update News

on:
  schedule:
    - cron: '45 20 * * *'   # 日本時間 朝5:45頃（混雑する毎時0分を避ける）
    - cron: '45 22 * * *'   # 日本時間 朝7:45頃（1回目が失敗/スキップされた時の保険）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch and summarize news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Update news $(date -u +'%Y-%m-%d')" || echo "変更なし"
          git push
